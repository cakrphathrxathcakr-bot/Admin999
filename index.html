<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TaeBank - Wealth Manager</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Sarabun:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-base: #070B19; 
            --bg-card: #121C33; 
            --bg-input: #0B1121; 
            --text-main: #F0F6FC; 
            --text-muted: #8B9BB4; 
            --gold: #D4AF37;
            --gold-gradient: linear-gradient(135deg, #BF953F 0%, #FCF6BA 50%, #B38728 100%);
            --border: #1E2B4D; 
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        .font-eng { font-family: 'Cinzel', serif; }
        .font-num { font-family: 'Outfit', sans-serif; }

        /* แยกหน้าจอให้เด็ดขาด ป้องกัน UI ทับซ้อน */
        .page-view {
            display: none;
            min-height: 100dvh;
            width: 100%;
        }
        .page-view.active {
            display: flex;
        }

        .glass-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .input-luxe {
            background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); 
            border-radius: 12px; padding: 14px 16px; width: 100%; box-sizing: border-box; transition: 0.3s;
        }
        .input-luxe:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15); }
        .input-luxe::placeholder { color: #4B5E82; }

        .btn-gold {
            background: var(--gold-gradient); color: #000; border: none; width: 100%;
            border-radius: 12px; padding: 14px; font-weight: 700; cursor: pointer;
            transition: all 0.2s; box-sizing: border-box;
        }
        .btn-gold:active { transform: scale(0.97); box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); }

        .member-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
            padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
        }

        .action-btn {
            background: rgba(212, 175, 55, 0.1); color: var(--gold);
            border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 10px; 
            padding: 10px; font-size: 13px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%;
        }

        .mini-btn {
            background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px;
            height: 36px; display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); width: 100%;
        }
        .mini-btn:active { background: #2A3B61; color: #FFF; }

        .swal2-popup { border-radius: 20px !important; background: var(--bg-card) !important; color: var(--text-main) !important; border: 1px solid var(--border) !important; }
        .swal2-html-container { color: var(--text-muted) !important;}
        .swal2-title { color: #FFF !important; }
    </style>
</head>
<body>

    <div id="page-login" class="page-view active items-center justify-center p-6">
        <div class="glass-panel p-8 w-full max-w-sm flex flex-col items-center border-t-2 border-t-[var(--gold)]">
            <div class="w-20 h-20 mb-6 bg-[var(--bg-input)] rounded-full flex items-center justify-center border border-[var(--border)] shadow-lg">
                <i class="fas fa-shield-halved text-4xl text-[var(--gold)]"></i>
            </div>
            <h2 class="text-2xl font-eng text-white mb-1 tracking-[4px]">MANAGEMENT</h2>
            <p class="text-xs text-[var(--text-muted)] mb-8 font-num tracking-widest uppercase">Admin Authorization</p>
            
            <div class="flex flex-col gap-4 w-full">
                <input type="password" id="adminPin" placeholder="Enter PIN" class="input-luxe text-center text-xl font-num tracking-[10px]">
                <button id="btnLogin" class="btn-gold text-sm tracking-widest font-outfit shadow-md">AUTHORIZE ACCESS</button>
            </div>
            
            <p class="text-center text-[10px] text-[#4B5E82] mt-8 tracking-wide uppercase">Developed by พระมหาจักรภัทร</p>
        </div>
    </div>

    <div id="page-main" class="page-view flex-col pb-10">
        <div class="w-full max-w-3xl mx-auto p-4 md:p-6 flex flex-col gap-6">
            
            <header class="flex justify-between items-center glass-panel p-4">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-[rgba(212,175,55,0.1)] flex items-center justify-center text-[var(--gold)] border border-[rgba(212,175,55,0.2)]">
                        <i class="fas fa-crown text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-white font-eng tracking-widest">TAEBANK <span class="text-[var(--gold)] text-[9px] border border-[var(--gold)] px-1.5 py-0.5 rounded-full ml-1 font-sans">ADMIN</span></h1>
                        <p class="text-[10px] text-[var(--text-muted)] mt-0.5">พระมหาจักรภัทร คมฺภีรญาณเมธี</p>
                    </div>
                </div>
                <button id="btnLogout" class="w-10 h-10 rounded-full bg-[var(--bg-input)] text-[var(--text-muted)] flex items-center justify-center border border-[var(--border)] active:bg-red-500 active:text-white">
                    <i class="fas fa-power-off"></i>
                </button>
            </header>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass-panel p-5 relative overflow-hidden group">
                    <div class="absolute -right-4 -bottom-4 opacity-5 text-7xl text-[var(--gold)]"><i class="fas fa-vault"></i></div>
                    <p class="text-[10px] text-[var(--gold)] font-eng tracking-widest mb-1 font-bold">Total Assets</p>
                    <h3 id="stat-balance" class="text-3xl font-bold text-white font-num tracking-tight mt-1">0.00</h3>
                </div>
                <div class="glass-panel p-5 relative overflow-hidden">
                    <div class="absolute -right-4 -bottom-4 opacity-5 text-7xl text-[var(--gold)]"><i class="fas fa-users"></i></div>
                    <p class="text-[10px] text-[var(--gold)] font-eng tracking-widest mb-1 font-bold">Members</p>
                    <h3 id="stat-members" class="text-3xl font-bold text-white font-num tracking-tight mt-1">0</h3>
                </div>
            </div>

            <div class="glass-panel p-5">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-sm font-bold text-white font-eng tracking-widest"><i class="fas fa-chart-pie text-[var(--gold)] mr-2"></i> Portfolio Share</h3>
                </div>
                <div class="relative h-[220px] w-full">
                    <canvas id="doughnutChart"></canvas>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button id="btnAdd" class="glass-panel p-4 flex flex-col items-center justify-center gap-2">
                    <div class="w-10 h-10 rounded-full bg-blue-900/30 text-blue-400 border border-blue-800/50 flex items-center justify-center"><i class="fas fa-user-plus text-lg"></i></div>
                    <span class="text-xs font-semibold text-white mt-1">เพิ่มบัญชีใหม่</span>
                </button>
                <label class="glass-panel p-4 flex flex-col items-center justify-center gap-2 cursor-pointer">
                    <div class="w-10 h-10 rounded-full bg-green-900/30 text-green-400 border border-green-800/50 flex items-center justify-center"><i class="fas fa-file-excel text-lg"></i></div>
                    <span class="text-xs font-semibold text-white mt-1">นำเข้า CSV</span>
                    <input type="file" id="btnImportCsv" accept=".csv" class="hidden">
                </label>
            </div>

            <div class="glass-panel p-5 min-h-[400px]">
                <div class="flex flex-col sm:flex-row justify-between gap-4 mb-6">
                    <h3 class="text-sm font-bold text-white font-eng tracking-widest"><i class="fas fa-address-book text-[var(--gold)] mr-2"></i> Directory</h3>
                    <div class="relative w-full sm:w-64">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-[#4B5E82]"></i>
                        <input type="text" id="searchInput" placeholder="ค้นหาบัญชี..." class="input-luxe pl-11 py-2 text-sm">
                    </div>
                </div>

                <div id="listContainer" class="space-y-0"></div>
                
                <div id="emptyState" class="hidden py-10 text-center text-[var(--text-muted)]">
                    <i class="fas fa-inbox text-3xl text-[#4B5E82] mb-3"></i>
                    <p class="text-sm font-medium">ไม่พบข้อมูลในระบบ</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getDatabase, ref, push, set, update, onValue, remove } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAiCtKW-U5QWp3yUsvToJlh2pT7sjiQ4Iw",
            authDomain: "taebankwat.firebaseapp.com",
            databaseURL: "https://taebankwat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "taebankwat",
            storageBucket: "taebankwat.firebasestorage.app",
            messagingSenderId: "134684838871",
            appId: "1:134684838871:web:4b47416599ed4ce95c5992"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const DB_STATE = { members: {}, transactions: {} };
        let chartInstance = null;

        const adminPass = "2598";
        let isInit = false;
        
        // --- Navigation Controller ---
        function switchPage(pageId) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        window.doLogin = () => {
            const pin = document.getElementById('adminPin').value;
            if (pin === adminPass) {
                switchPage('page-main');
                if(!isInit) { fetchDatabase(); isInit = true; }
            } else {
                Swal.fire({ icon: 'error', title: 'รหัสไม่ถูกต้อง', confirmButtonColor: '#C49A45' });
            }
        }

        document.getElementById('btnLogin').addEventListener('click', window.doLogin);
        document.getElementById('adminPin').addEventListener('keypress', (e) => { if(e.key === 'Enter') window.doLogin(); });
        document.getElementById('btnLogout').addEventListener('click', () => location.reload());

        function fetchDatabase() {
            onValue(ref(db, 'members'), (snap) => { DB_STATE.members = snap.val() || {}; renderDashboard(); });
            onValue(ref(db, 'transactions'), (snap) => { DB_STATE.transactions = snap.val() || {}; renderDashboard(); });
        }

        function renderDashboard() {
            const searchKeyword = document.getElementById('searchInput').value.toLowerCase().trim();
            const listContainer = document.getElementById('listContainer');
            const emptyState = document.getElementById('emptyState');
            
            let totalBal = 0; let totalMem = 0; let chartData = [];
            listContainer.innerHTML = '';

            const keys = Object.keys(DB_STATE.members);
            
            keys.sort((a, b) => parseInt(a) - parseInt(b)).forEach(dbKey => {
                const m = DB_STATE.members[dbKey];
                const sName = (m.name || '').toLowerCase();
                const sNick = (m.nick || '').toLowerCase();
                
                if (searchKeyword && !dbKey.includes(searchKeyword) && !sName.includes(searchKeyword) && !sNick.includes(searchKeyword)) return;

                totalMem++;
                let mBal = 0;
                Object.keys(DB_STATE.transactions).forEach(txId => {
                    const tx = DB_STATE.transactions[txId];
                    if (tx.studentCode === dbKey) mBal += (tx.type === 'deposit' ? parseFloat(tx.amount) : -parseFloat(tx.amount));
                });

                totalBal += mBal;
                if (mBal > 0) chartData.push({ name: m.nick || dbKey, bal: mBal });

                const card = document.createElement('div');
                card.className = 'member-card';
                card.innerHTML = `
                    <div class="flex-1 pr-2 overflow-hidden">
                        <div class="flex items-baseline gap-2 mb-1">
                            <span class="font-num text-[11px] text-[var(--gold)] font-bold tracking-[2px] bg-[rgba(212,175,55,0.1)] px-2 py-0.5 rounded-md">${dbKey}</span>
                        </div>
                        <h4 class="font-bold text-base text-white leading-tight mt-1 truncate">${m.nick || '-'}</h4>
                        <p class="text-[11px] text-[var(--text-muted)] truncate w-full">${m.name || '-'}</p>
                        <div class="mt-2.5 text-[22px] font-num font-semibold ${mBal >= 0 ? 'text-[#10B981]' : 'text-[#EF4444]'}">฿${mBal.toLocaleString()}</div>
                    </div>
                    <div class="flex flex-col gap-2 w-32 flex-shrink-0">
                        <button class="action-btn btn-tx"><i class="fas fa-bolt text-[var(--gold)]"></i> ทำรายการ</button>
                        <div class="grid grid-cols-3 gap-1.5 w-full">
                            <button class="mini-btn btn-hist" title="ประวัติ"><i class="fas fa-history"></i></button>
                            <button class="mini-btn btn-edit" title="แก้ไข"><i class="fas fa-pen"></i></button>
                            <button class="mini-btn btn-del" title="ลบ"><i class="fas fa-trash text-red-400"></i></button>
                        </div>
                    </div>
                `;

                card.querySelector('.btn-tx').addEventListener('click', () => actionTransact(dbKey, m.nick));
                card.querySelector('.btn-hist').addEventListener('click', () => actionHistory(dbKey, m.nick));
                card.querySelector('.btn-edit').addEventListener('click', () => actionEdit(dbKey, m.nick, m.name));
                card.querySelector('.btn-del').addEventListener('click', () => actionDelete(dbKey));

                listContainer.appendChild(card);
            });

            document.getElementById('stat-members').innerText = totalMem;
            document.getElementById('stat-balance').innerText = totalBal.toLocaleString(undefined, {minimumFractionDigits:2});
            emptyState.style.display = totalMem === 0 ? 'block' : 'none';

            drawChart(chartData);
        }

        document.getElementById('searchInput').addEventListener('input', renderDashboard);

        function drawChart(dataArr) {
            const ctx = document.getElementById('doughnutChart').getContext('2d');
            dataArr.sort((a,b) => b.bal - a.bal); 
            
            const labels = dataArr.map(d => d.name);
            const data = dataArr.map(d => d.bal);
            const colors = ['#D4AF37','#3B82F6','#60A5FA','#10B981','#8B5CF6','#F59E0B','#06B6D4','#EC4899'];

            if (chartInstance) chartInstance.destroy();
            if (data.length === 0) { labels.push('ไม่มีข้อมูล'); data.push(1); colors.unshift('#1E2B4D'); }

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 2, borderColor: '#121C33', hoverOffset: 4 }] },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '75%',
                    plugins: {
                        legend: { position: 'right', labels: { color: '#8B9BB4', font: {family:'Sarabun', size:11}, usePointStyle: true, boxWidth: 8 } },
                        tooltip: {
                            backgroundColor: '#070B19', titleColor: '#FFF', bodyColor: '#8B9BB4', borderColor: '#1E2B4D', borderWidth: 1,
                            callbacks: {
                                label: function(c) {
                                    if(data.length === 1 && labels[0] === 'ไม่มีข้อมูล') return ' 0 บาท';
                                    return ` ฿${c.raw.toLocaleString()} (${((c.raw / c.chart._metasets[0].total)*100).toFixed(1)}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        async function actionTransact(dbKey, nick) {
            const res = await Swal.fire({
                title: `<span style="font-family:'Sarabun'; color:#D4AF37; font-size:1.2rem; font-weight:bold;">ทำรายการ: ${nick||dbKey}</span>`,
                showDenyButton: true, showCancelButton: true,
                confirmButtonText: 'ฝากเงิน', confirmButtonColor: '#10B981',
                denyButtonText: 'ถอนเงิน', denyButtonColor: '#EF4444',
                cancelButtonText: 'ยกเลิก', cancelButtonColor: '#1E2B4D',
                customClass: { actions: 'flex flex-col gap-2 w-full px-6', confirmButton: 'w-full m-0', denyButton: 'w-full m-0', cancelButton: 'w-full m-0 text-[#8B9BB4]' }
            });

            if (res.isConfirmed || res.isDenied) {
                const isDep = res.isConfirmed;
                const amtRes = await Swal.fire({
                    title: `<span style="color:#FFF;">ระบุจำนวนเงิน${isDep?'ฝาก':'ถอน'}</span>`,
                    input: 'number', inputAttributes: { min: 1 },
                    confirmButtonText: 'ยืนยัน', confirmButtonColor: '#C49A45',
                    customClass: { input: 'text-center font-num text-2xl bg-[#0B1121] text-white border-[#1E2B4D]' },
                    inputValidator: (val) => { if (!val || val <= 0) return 'ระบุจำนวนเงินให้ถูกต้อง'; }
                });

                if (amtRes.value) {
                    await push(ref(db, 'transactions'), { studentCode: dbKey, type: isDep ? 'deposit' : 'withdraw', amount: parseFloat(amtRes.value), date: new Date().toISOString() });
                    Swal.fire({ icon: 'success', title: 'สำเร็จ', timer: 1000, showConfirmButton: false });
                }
            }
        }

        function actionHistory(dbKey, nick) {
            const userTxs = [];
            Object.keys(DB_STATE.transactions).forEach(txId => {
                if (DB_STATE.transactions[txId].studentCode === dbKey) userTxs.push({ id: txId, ...DB_STATE.transactions[txId] });
            });
            userTxs.sort((a,b) => new Date(b.date) - new Date(a.date));

            const container = document.createElement('div');
            container.className = 'max-h-64 overflow-y-auto space-y-2 mt-2 pr-1 text-left';
            
            if(userTxs.length === 0) {
                container.innerHTML = '<div class="text-center text-[#4B5E82] py-4 text-sm">ไม่มีประวัติ</div>';
            } else {
                userTxs.forEach(t => {
                    const isDep = t.type === 'deposit';
                    const d = new Date(t.date);
                    const div = document.createElement('div');
                    div.className = 'flex justify-between items-center bg-[#0B1121] border border-[#1E2B4D] p-3 rounded-xl';
                    div.innerHTML = `
                        <div>
                            <p class="text-xs font-bold ${isDep?'text-[#10B981]':'text-[#EF4444]'}">${isDep ? 'ฝากเข้า' : 'ถอนออก'}</p>
                            <p class="text-[10px] text-[#8B9BB4] font-num">${d.toLocaleDateString('th-TH',{day:'2-digit',month:'short'})} ${d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-num font-bold text-sm ${isDep?'text-[#10B981]':'text-[#EF4444]'}">${isDep?'+':'-'}${parseFloat(t.amount).toLocaleString()}</span>
                            <button class="w-6 h-6 rounded-full bg-red-900/30 text-red-400 border border-red-800/50 flex items-center justify-center del-tx-btn"><i class="fas fa-times text-[10px]"></i></button>
                        </div>
                    `;
                    div.querySelector('.del-tx-btn').addEventListener('click', async () => {
                        const confirm = await Swal.fire({ title: '<span style="color:#FFF">ลบรายการนี้?</span>', showCancelButton:true, confirmButtonColor:'#EF4444', cancelButtonColor: '#1E2B4D', confirmButtonText:'ลบ', cancelButtonText:'ยกเลิก' });
                        if(confirm.isConfirmed) { await remove(ref(db, 'transactions/' + t.id)); Swal.close(); setTimeout(() => actionHistory(dbKey, nick), 300); }
                    });
                    container.appendChild(div);
                });
            }
            Swal.fire({ title: `<span style="font-size:1.1rem; font-weight:bold; color:#FFF;">ประวัติ: ${nick||dbKey}</span>`, html: container, showConfirmButton: false, showCloseButton: true, customClass: { closeButton: 'text-white' } });
        }

        async function actionEdit(dbKey, oldNick, oldName) {
            const res = await Swal.fire({
                title: '<span style="color:#FFF">แก้ไขข้อมูล</span>',
                html: `
                    <div class="text-left text-xs text-[#8B9BB4] mb-1 ml-1">รหัสบัญชี (แก้ไขไม่ได้)</div>
                    <input class="input-luxe bg-[#070B19] text-[#4B5E82] border-[#1E2B4D] font-num text-center mb-3" value="${dbKey}" disabled>
                    <input id="enick" class="input-luxe mb-3" value="${oldNick}" placeholder="ชื่อเล่น">
                    <input id="ename" class="input-luxe text-sm" value="${oldName}" placeholder="ชื่อจริง">
                `,
                confirmButtonText: 'บันทึก', confirmButtonColor: '#C49A45',
                preConfirm: () => [document.getElementById('enick').value, document.getElementById('ename').value]
            });
            if (res.value) { await update(ref(db, 'members/' + dbKey), { nick: res.value[0], name: res.value[1] }); Swal.fire({icon:'success', title:'อัปเดตแล้ว', timer:1000, showConfirmButton:false}); }
        }

        async function actionDelete(dbKey) {
            const res = await Swal.fire({ title: '<span style="color:#FFF">ลบถาวร?</span>', icon: 'warning', showCancelButton: true, confirmButtonText: 'ลบทิ้ง', confirmButtonColor: '#EF4444', cancelButtonColor: '#1E2B4D' });
            if (res.isConfirmed) {
                await remove(ref(db, 'members/' + dbKey));
                Object.keys(DB_STATE.transactions).forEach(async txId => { if (DB_STATE.transactions[txId].studentCode === dbKey) await remove(ref(db, 'transactions/' + txId)); });
                Swal.fire({icon:'success', title:'ลบสำเร็จ', timer:1000, showConfirmButton:false});
            }
        }

        document.getElementById('btnAdd').addEventListener('click', async () => {
            const res = await Swal.fire({
                title: '<span style="color:#FFF">เพิ่มบัญชีใหม่</span>',
                html: `
                    <input id="scode" class="input-luxe font-num text-center mb-3 font-bold" placeholder="เลขบัญชี (ห้ามซ้ำ)">
                    <input id="snick" class="input-luxe text-center mb-3" placeholder="ชื่อเล่น/ฉายา">
                    <input id="sname" class="input-luxe text-center text-sm" placeholder="ชื่อจริง">
                `,
                confirmButtonText: 'สร้าง', confirmButtonColor: '#C49A45',
                preConfirm: () => [document.getElementById('scode').value.replace(/[^a-zA-Z0-9]/g, ''), document.getElementById('snick').value, document.getElementById('sname').value]
            });
            if (res.value && res.value[0]) { await set(ref(db, 'members/' + res.value[0]), { nick: res.value[1], name: res.value[2] }); Swal.fire({icon:'success', title:'สำเร็จ', timer:1000, showConfirmButton:false}); }
        });

        document.getElementById('btnImportCsv').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            Papa.parse(file, {
                header: true,
                complete: async (results) => {
                    let count = 0;
                    for (const row of results.data) {
                        const code = String(row.เลขที่บัญชี||'').replace(/\s/g, '').replace(/[^a-zA-Z0-9]/g, '');
                        if(!code) continue;
                        await set(ref(db, 'members/' + code), { nick: row['นมัสการ สามเณร..'] || '', name: row.ชื่อจริง || '' });
                        if (row.ยอดคงเหลือ) {
                            const amt = parseFloat(String(row.ยอดคงเหลือ).replace(/,/g, ''));
                            if (amt > 0) await push(ref(db, 'transactions'), { studentCode: code, type: 'deposit', amount: amt, date: new Date().toISOString() });
                        }
                        count++;
                    }
                    Swal.fire({ icon: 'success', title: `สำเร็จ ${count} รายการ`, confirmButtonColor: '#C49A45' });
                    e.target.value = '';
                }
            });
        });
    </script>
</body>
</html>
