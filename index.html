<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TaeBank - Wealth Manager</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Sarabun:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* --- THEME: QUIET LUXURY --- */
        :root {
            --bg-base: #F8F9FA; 
            --bg-card: #FFFFFF;
            --text-dark: #1F2937;
            --text-light: #6B7280;
            --gold: #C49A45;
            --gold-gradient: linear-gradient(135deg, #E2C275 0%, #D4AF37 50%, #B38728 100%);
            --border: #E5E7EB;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-dark);
            -webkit-tap-highlight-color: transparent;
        }

        .font-eng { font-family: 'Cinzel', serif; }
        .font-num { font-family: 'Outfit', sans-serif; }

        /* UI Elements */
        .glass-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
        }

        .input-luxe {
            background: #F3F4F6; border: 1px solid #D1D5DB; color: var(--text-dark); 
            border-radius: 12px; padding: 12px 16px; width: 100%; transition: all 0.3s;
        }
        .input-luxe:focus { border-color: var(--gold); background: #FFF; outline: none; box-shadow: 0 0 0 3px rgba(196, 154, 69, 0.1); }

        .btn-gold {
            background: var(--gold-gradient); color: #FFF; border: none;
            border-radius: 12px; padding: 14px; font-weight: 600; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-gold:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(196, 154, 69, 0.3); }

        /* Member Card */
        .member-card {
            background: #FFF; border: 1px solid var(--border); border-radius: 16px;
            padding: 16px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.01); transition: 0.2s;
        }
        .member-card:active { transform: scale(0.98); border-color: var(--gold); }

        .action-btn {
            background: rgba(196, 154, 69, 0.08); color: var(--gold);
            border: 1px solid rgba(196, 154, 69, 0.2); border-radius: 10px; 
            padding: 10px; font-size: 13px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .action-btn:active { background: var(--gold); color: #FFF; }

        .mini-btn {
            background: #F9FAFB; border: 1px solid var(--border); border-radius: 8px;
            height: 36px; display: flex; align-items: center; justify-content: center;
            font-size: 13px; color: var(--text-light); transition: 0.2s;
        }
        .mini-btn-history:active { background: #E5E7EB; }
        .mini-btn-edit:active { background: #3B82F6; color: #FFF; border-color: #3B82F6; }
        .mini-btn-delete:active { background: #EF4444; color: #FFF; border-color: #EF4444; }

        /* SweetAlert */
        .swal2-popup { border-radius: 20px !important; padding: 20px !important; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }

        /* Helpers */
        .hidden-safely { display: none !important; }
    </style>
</head>
<body class="pb-10">

    <div id="view-login" class="fixed inset-0 bg-[var(--bg-base)] z-50 flex items-center justify-center p-6">
        <div class="glass-panel p-8 w-full max-w-sm text-center">
            <div class="w-20 h-20 mx-auto mb-6 bg-white rounded-full flex items-center justify-center border border-gray-100 shadow-sm">
                <i class="fas fa-crown text-4xl text-[#C49A45]"></i>
            </div>
            <h2 class="text-2xl font-eng text-[var(--text-dark)] mb-1 tracking-[4px]">MANAGEMENT</h2>
            <p class="text-xs text-[var(--text-light)] mb-8 font-num tracking-widest uppercase">Admin Authorization</p>
            
            <input type="password" id="adminPin" placeholder="Enter PIN" class="input-luxe text-center text-xl font-num tracking-[10px] mb-6">
            <button id="btnLogin" class="btn-gold w-full text-sm tracking-widest font-outfit shadow-md">AUTHORIZE ACCESS</button>
        </div>
    </div>

    <div id="view-main" class="hidden-safely w-full max-w-3xl mx-auto p-4 md:p-6 flex flex-col gap-6">
        
        <header class="flex justify-between items-center glass-panel p-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-[#C49A45]/10 flex items-center justify-center text-[#C49A45]">
                    <i class="fas fa-shield-alt text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-[var(--text-dark)] font-eng tracking-widest">TAEBANK <span class="text-[#C49A45] text-[9px] border border-[#C49A45] px-1.5 py-0.5 rounded-full ml-1 font-sans">ADMIN</span></h1>
                    <p class="text-[10px] text-[var(--text-light)] mt-0.5">พระมหาจักรภัทร คมฺภีรญาณเมธี</p>
                </div>
            </div>
            <button id="btnLogout" class="w-10 h-10 rounded-full bg-gray-50 text-[var(--text-light)] flex items-center justify-center border border-gray-200 active:bg-red-500 active:text-white transition-all">
                <i class="fas fa-power-off"></i>
            </button>
        </header>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass-panel p-5 relative overflow-hidden">
                <div class="absolute -right-4 -bottom-4 opacity-[0.03] text-7xl"><i class="fas fa-gem"></i></div>
                <p class="text-[10px] text-[#C49A45] font-eng tracking-widest mb-1 font-bold">Total Assets</p>
                <h3 id="stat-balance" class="text-3xl font-bold text-[var(--text-dark)] font-num tracking-tight mt-1">0.00</h3>
                <p class="text-[10px] text-[var(--text-light)] mt-1">ยอดเงินรวมทั้งธนาคาร</p>
            </div>
            <div class="glass-panel p-5 relative overflow-hidden">
                <div class="absolute -right-4 -bottom-4 opacity-[0.03] text-7xl"><i class="fas fa-users"></i></div>
                <p class="text-[10px] text-[#C49A45] font-eng tracking-widest mb-1 font-bold">Members</p>
                <h3 id="stat-members" class="text-3xl font-bold text-[var(--text-dark)] font-num tracking-tight mt-1">0</h3>
                <p class="text-[10px] text-[var(--text-light)] mt-1">บัญชีในระบบทั้งหมด</p>
            </div>
        </div>

        <div class="glass-panel p-5">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-sm font-bold text-[var(--text-dark)] font-eng tracking-widest"><i class="fas fa-chart-pie text-[#C49A45] mr-2"></i> Portfolio Share</h3>
            </div>
            <div class="relative h-[220px] w-full">
                <canvas id="doughnutChart"></canvas>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button id="btnAdd" class="glass-panel p-4 flex flex-col items-center justify-center gap-2 active:border-[#C49A45] transition-all">
                <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center"><i class="fas fa-user-plus text-lg"></i></div>
                <span class="text-xs font-semibold text-[var(--text-dark)] mt-1">เพิ่มบัญชีใหม่</span>
            </button>
            <label class="glass-panel p-4 flex flex-col items-center justify-center gap-2 active:border-[#C49A45] transition-all cursor-pointer">
                <div class="w-10 h-10 rounded-full bg-green-50 text-green-600 flex items-center justify-center"><i class="fas fa-file-excel text-lg"></i></div>
                <span class="text-xs font-semibold text-[var(--text-dark)] mt-1">นำเข้า CSV</span>
                <input type="file" id="btnImportCsv" accept=".csv" class="hidden">
            </label>
        </div>

        <div class="glass-panel p-5 min-h-[400px]">
            <div class="flex flex-col sm:flex-row justify-between gap-4 mb-6">
                <h3 class="text-sm font-bold text-[var(--text-dark)] font-eng tracking-widest"><i class="fas fa-address-book text-[#C49A45] mr-2"></i> Client Directory</h3>
                <div class="relative w-full sm:w-64">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="ค้นหาบัญชี..." class="input-luxe pl-11 py-2 text-sm">
                </div>
            </div>

            <div id="listContainer" class="space-y-0">
                </div>
            
            <div id="emptyState" class="hidden-safely py-10 text-center text-[var(--text-light)]">
                <div class="w-14 h-14 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-3 border border-gray-200">
                    <i class="fas fa-inbox text-xl text-gray-300"></i>
                </div>
                <p class="text-sm font-medium">ไม่พบข้อมูลในระบบ</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getDatabase, ref, push, set, update, onValue, remove } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAiCtKW-U5QWp3yUsvToJlh2pT7sjiQ4Iw",
            authDomain: "taebankwat.firebaseapp.com",
            databaseURL: "https://taebankwat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "taebankwat",
            storageBucket: "taebankwat.firebasestorage.app",
            messagingSenderId: "134684838871",
            appId: "1:134684838871:web:4b47416599ed4ce95c5992"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // --- STATE (ฐานข้อมูลจำลองบนเครื่อง ทำงานไวปรื๊ด) ---
        const DB_STATE = {
            members: {},
            transactions: {}
        };
        let chartInstance = null;

        // --- 1. AUTHENTICATION (แก้ปัญหาเด้งออก) ---
        const adminPass = "2598";
        
        function handleLogin() {
            const pin = document.getElementById('adminPin').value;
            if (pin === adminPass) {
                document.getElementById('view-login').classList.add('hidden-safely');
                document.getElementById('view-main').classList.remove('hidden-safely');
                fetchDatabase(); // โหลดข้อมูลครั้งเดียว
            } else {
                Swal.fire({ icon: 'error', title: 'รหัสไม่ถูกต้อง', confirmButtonColor: '#C49A45' });
            }
        }

        // ดักปุ่มคลิก และ ดักปุ่ม Enter ในคีย์บอร์ด
        document.getElementById('btnLogin').addEventListener('click', handleLogin);
        document.getElementById('adminPin').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('btnLogout').addEventListener('click', () => location.reload());

        // --- 2. FETCH DATABASE (ดึงข้อมูลแบบฉลาด) ---
        function fetchDatabase() {
            onValue(ref(db, 'members'), (snapshot) => {
                DB_STATE.members = snapshot.val() || {};
                renderDashboard();
            });

            onValue(ref(db, 'transactions'), (snapshot) => {
                DB_STATE.transactions = snapshot.val() || {};
                renderDashboard();
            });
        }

        // --- 3. RENDER ENGINE (วาดหน้าจอ) ---
        function renderDashboard() {
            const searchKeyword = document.getElementById('searchInput').value.toLowerCase().trim();
            const listContainer = document.getElementById('listContainer');
            const emptyState = document.getElementById('emptyState');
            
            let totalBankAssets = 0;
            let totalMembers = 0;
            let chartData = [];
            listContainer.innerHTML = '';

            // วนลูปข้อมูลสมาชิกทั้งหมด
            const memberKeys = Object.keys(DB_STATE.members);
            
            // เรียงรหัสจากน้อยไปมาก
            memberKeys.sort((a, b) => parseInt(a) - parseInt(b)).forEach(dbKey => {
                const member = DB_STATE.members[dbKey];
                const safeName = (member.name || '').toLowerCase();
                const safeNick = (member.nick || '').toLowerCase();
                
                // ค้นหา
                if (searchKeyword && !dbKey.includes(searchKeyword) && !safeName.includes(searchKeyword) && !safeNick.includes(searchKeyword)) {
                    return; // ข้ามคนที่ไม่ตรงเงื่อนไข
                }

                totalMembers++;

                // คำนวณเงินของคนนี้
                let memberBalance = 0;
                Object.keys(DB_STATE.transactions).forEach(txId => {
                    const tx = DB_STATE.transactions[txId];
                    if (tx.studentCode === dbKey) {
                        memberBalance += (tx.type === 'deposit' ? parseFloat(tx.amount) : -parseFloat(tx.amount));
                    }
                });

                totalBankAssets += memberBalance;
                if (memberBalance > 0) {
                    chartData.push({ name: member.nick || dbKey, bal: memberBalance });
                }

                // สร้างการ์ด (ใช้ DOM ซ่อนตัวแปร เพื่อป้องกันบัคเครื่องหมายคำพูด ' " ขัดแย้งกัน)
                const card = document.createElement('div');
                card.className = 'member-card';
                card.innerHTML = `
                    <div class="flex-1 pr-2 overflow-hidden">
                        <div class="flex items-baseline gap-2 mb-1">
                            <span class="font-num text-[11px] text-[#C49A45] font-bold tracking-[2px] bg-[#C49A45]/10 px-2 py-0.5 rounded-md">${dbKey}</span>
                        </div>
                        <h4 class="font-bold text-base text-[var(--text-dark)] leading-tight mt-1 truncate">${member.nick || '-'}</h4>
                        <p class="text-[11px] text-[var(--text-light)] truncate w-full">${member.name || '-'}</p>
                        <div class="mt-2.5 text-[22px] font-num font-semibold ${memberBalance >= 0 ? 'text-[#059669]' : 'text-[#EF4444]'}">
                            ฿${memberBalance.toLocaleString()}
                        </div>
                    </div>
                    <div class="flex flex-col gap-2 w-32 flex-shrink-0">
                        <button class="action-btn w-full btn-tx"><i class="fas fa-bolt text-[#C49A45]"></i> ทำรายการ</button>
                        <div class="grid grid-cols-3 gap-1.5 w-full">
                            <button class="mini-btn mini-btn-history btn-hist" title="ประวัติ"><i class="fas fa-history"></i></button>
                            <button class="mini-btn mini-btn-edit btn-edit" title="แก้ไข"><i class="fas fa-pen"></i></button>
                            <button class="mini-btn mini-btn-delete btn-del" title="ลบ"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;

                // ผูก Event Listener (วิธีนี้ป้องกันบัค Code พัง 100%)
                card.querySelector('.btn-tx').addEventListener('click', () => actionTransact(dbKey, member.nick));
                card.querySelector('.btn-hist').addEventListener('click', () => actionHistory(dbKey, member.nick));
                card.querySelector('.btn-edit').addEventListener('click', () => actionEdit(dbKey, member.nick, member.name));
                card.querySelector('.btn-del').addEventListener('click', () => actionDelete(dbKey));

                listContainer.appendChild(card);
            });

            // อัปเดตตัวเลข
            document.getElementById('stat-members').innerText = totalMembers;
            document.getElementById('stat-balance').innerText = totalBankAssets.toLocaleString(undefined, {minimumFractionDigits:2});
            
            // สลับสถานะกล่องว่าง
            if (totalMembers === 0) emptyState.classList.remove('hidden-safely');
            else emptyState.classList.add('hidden-safely');

            drawChart(chartData);
        }

        // ระบบค้นหาแบบเรียลไทม์
        document.getElementById('searchInput').addEventListener('input', renderDashboard);

        // --- 4. กราฟโดนัท ---
        function drawChart(dataArr) {
            const ctx = document.getElementById('doughnutChart').getContext('2d');
            dataArr.sort((a,b) => b.bal - a.bal); // มากไปน้อย
            
            const labels = dataArr.map(d => d.name);
            const data = dataArr.map(d => d.bal);
            const colors = ['#C49A45','#94A3B8','#A0522D','#2E8B57','#4169E1','#9966CC','#E87A5D','#4B5563','#00CED1','#F472B6'];

            if (chartInstance) chartInstance.destroy();

            if (data.length === 0) {
                labels.push('ไม่มีข้อมูล'); data.push(1); colors.unshift('#F3F4F6');
            }

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 2, borderColor: '#FFF', hoverOffset: 4 }] },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '75%',
                    plugins: {
                        legend: { position: 'right', labels: { color: '#6B7280', font: {family:'Sarabun', size:11}, usePointStyle: true, boxWidth: 8 } },
                        tooltip: {
                            callbacks: {
                                label: function(c) {
                                    if(data.length === 1 && labels[0] === 'ไม่มีข้อมูล') return ' 0 บาท';
                                    const perc = ((c.raw / c.chart._metasets[0].total) * 100).toFixed(1);
                                    return ` ฿${c.raw.toLocaleString()} (${perc}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        // --- 5. ACTION FUNCTIONS (ระบบควบคุม 100% Bug Free) ---

        async function actionTransact(dbKey, nick) {
            const res = await Swal.fire({
                title: `<span style="font-family:'Sarabun'; color:#C49A45; font-size:1.2rem; font-weight:bold;">ทำรายการ: ${nick||dbKey}</span>`,
                showDenyButton: true, showCancelButton: true,
                confirmButtonText: 'ฝากเงินเข้า', confirmButtonColor: '#10B981',
                denyButtonText: 'ถอนเงินออก', denyButtonColor: '#EF4444',
                cancelButtonText: 'ยกเลิก',
                customClass: { actions: 'flex flex-col gap-2 w-full px-6', confirmButton: 'w-full m-0', denyButton: 'w-full m-0', cancelButton: 'w-full m-0' }
            });

            if (res.isConfirmed || res.isDenied) {
                const isDep = res.isConfirmed;
                const amtRes = await Swal.fire({
                    title: `ระบุจำนวนเงิน${isDep?'ฝาก':'ถอน'}`,
                    input: 'number', inputAttributes: { min: 1 },
                    confirmButtonText: 'ยืนยัน', confirmButtonColor: '#C49A45',
                    customClass: { input: 'text-center font-num text-2xl' },
                    inputValidator: (val) => { if (!val || val <= 0) return 'ระบุจำนวนเงินให้ถูกต้อง'; }
                });

                if (amtRes.value) {
                    await push(ref(db, 'transactions'), {
                        studentCode: dbKey, type: isDep ? 'deposit' : 'withdraw',
                        amount: parseFloat(amtRes.value), date: new Date().toISOString()
                    });
                    Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', timer: 1000, showConfirmButton: false });
                }
            }
        }

        function actionHistory(dbKey, nick) {
            // คัดประวัติของคนๆ นี้มา
            const userTxs = [];
            Object.keys(DB_STATE.transactions).forEach(txId => {
                if (DB_STATE.transactions[txId].studentCode === dbKey) {
                    userTxs.push({ id: txId, ...DB_STATE.transactions[txId] });
                }
            });
            userTxs.sort((a,b) => new Date(b.date) - new Date(a.date));

            const container = document.createElement('div');
            container.className = 'max-h-64 overflow-y-auto space-y-2 mt-2 pr-1 text-left';
            
            if(userTxs.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-4 text-sm">ไม่มีประวัติ</div>';
            } else {
                userTxs.forEach(t => {
                    const isDep = t.type === 'deposit';
                    const d = new Date(t.date);
                    const div = document.createElement('div');
                    div.className = 'flex justify-between items-center bg-gray-50 border border-gray-100 p-3 rounded-xl';
                    div.innerHTML = `
                        <div>
                            <p class="text-xs font-bold text-gray-700">${isDep ? 'ฝากเข้า' : 'ถอนออก'}</p>
                            <p class="text-[10px] text-gray-500 font-num">${d.toLocaleDateString('th-TH',{day:'2-digit',month:'short'})} ${d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-num font-bold text-sm ${isDep?'text-green-600':'text-red-500'}">${isDep?'+':'-'}${parseFloat(t.amount).toLocaleString()}</span>
                            <button class="w-6 h-6 rounded-full bg-red-100 text-red-500 flex items-center justify-center del-tx-btn"><i class="fas fa-times text-[10px]"></i></button>
                        </div>
                    `;
                    // ดักจับการกดลบประวัติย้อนหลัง
                    div.querySelector('.del-tx-btn').addEventListener('click', async () => {
                        const confirm = await Swal.fire({ title: 'ลบรายการนี้?', showCancelButton:true, confirmButtonColor:'#EF4444', confirmButtonText:'ลบ', cancelButtonText:'ยกเลิก' });
                        if(confirm.isConfirmed) {
                            await remove(ref(db, 'transactions/' + t.id));
                            Swal.close(); // ปิดหน้าต่างลง
                            setTimeout(() => actionHistory(dbKey, nick), 300); // โหลดหน้าต่างใหม่
                        }
                    });
                    container.appendChild(div);
                });
            }

            Swal.fire({
                title: `<span style="font-size:1.1rem; font-weight:bold;">ประวัติ: ${nick||dbKey}</span>`,
                html: container, showConfirmButton: false, showCloseButton: true
            });
        }

        async function actionEdit(dbKey, oldNick, oldName) {
            const res = await Swal.fire({
                title: 'แก้ไขข้อมูล',
                html: `
                    <div class="text-left text-xs text-gray-500 mb-1 ml-1">รหัสบัญชี (แก้ไขไม่ได้)</div>
                    <input class="input-luxe bg-gray-100 text-gray-400 font-num text-center mb-3" value="${dbKey}" disabled>
                    <div class="text-left text-xs text-gray-500 mb-1 ml-1">ชื่อเล่น / ฉายา</div>
                    <input id="enick" class="input-luxe mb-3" value="${oldNick}">
                    <div class="text-left text-xs text-gray-500 mb-1 ml-1">ชื่อจริง</div>
                    <input id="ename" class="input-luxe text-sm" value="${oldName}">
                `,
                confirmButtonText: 'บันทึก', confirmButtonColor: '#C49A45',
                preConfirm: () => [document.getElementById('enick').value, document.getElementById('ename').value]
            });

            if (res.value) {
                // แก้ไขทับรหัสเดิม (dbKey) เสมอ! ไม่มีบัญชีงอก
                await update(ref(db, 'members/' + dbKey), { nick: res.value[0], name: res.value[1] });
                Swal.fire({icon:'success', title:'อัปเดตแล้ว', timer:1000, showConfirmButton:false});
            }
        }

        async function actionDelete(dbKey) {
            const res = await Swal.fire({
                title: 'ลบข้อมูลถาวร?', text: "รายชื่อและประวัติเงินจะหายไปทั้งหมด", icon: 'warning',
                showCancelButton: true, confirmButtonText: 'ลบทิ้ง', confirmButtonColor: '#EF4444', cancelButtonText: 'ยกเลิก'
            });

            if (res.isConfirmed) {
                // 1. ลบรายชื่อ
                await remove(ref(db, 'members/' + dbKey));
                // 2. ลบประวัติเงินของคนๆ นี้ให้เกลี้ยง
                Object.keys(DB_STATE.transactions).forEach(async txId => {
                    if (DB_STATE.transactions[txId].studentCode === dbKey) {
                        await remove(ref(db, 'transactions/' + txId));
                    }
                });
                Swal.fire({icon:'success', title:'ลบสำเร็จ', timer:1000, showConfirmButton:false});
            }
        }

        // --- 6. ADD & IMPORT ---
        document.getElementById('btnAdd').addEventListener('click', async () => {
            const res = await Swal.fire({
                title: 'เพิ่มบัญชีใหม่',
                html: `
                    <input id="scode" class="input-luxe font-num text-center mb-3 font-bold" placeholder="เลขบัญชี (ห้ามซ้ำ)">
                    <input id="snick" class="input-luxe text-center mb-3" placeholder="ชื่อเล่น/ฉายา">
                    <input id="sname" class="input-luxe text-center text-sm" placeholder="ชื่อจริง">
                `,
                confirmButtonText: 'สร้าง', confirmButtonColor: '#C49A45',
                preConfirm: () => [document.getElementById('scode').value.replace(/[^a-zA-Z0-9]/g, ''), document.getElementById('snick').value, document.getElementById('sname').value]
            });

            if (res.value && res.value[0]) {
                await set(ref(db, 'members/' + res.value[0]), { nick: res.value[1], name: res.value[2] });
                Swal.fire({icon:'success', title:'เพิ่มสำเร็จ', timer:1000, showConfirmButton:false});
            }
        });

        document.getElementById('btnImportCsv').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            Papa.parse(file, {
                header: true,
                complete: async (results) => {
                    let count = 0;
                    for (const row of results.data) {
                        if (row.เลขที่บัญชี) {
                            // ล้างรหัสให้สะอาดหมดจด
                            const code = String(row.เลขที่บัญชี).replace(/\s/g, '').replace(/[^a-zA-Z0-9]/g, '');
                            if(!code) continue;
                            await set(ref(db, 'members/' + code), { nick: row['นมัสการ สามเณร..'] || '', name: row.ชื่อจริง || '' });
                            if (row.ยอดคงเหลือ) {
                                const amt = parseFloat(String(row.ยอดคงเหลือ).replace(/,/g, ''));
                                if (amt > 0) await push(ref(db, 'transactions'), { studentCode: code, type: 'deposit', amount: amt, date: new Date().toISOString() });
                            }
                            count++;
                        }
                    }
                    Swal.fire({ icon: 'success', title: `นำเข้าสำเร็จ ${count} รายการ`, confirmButtonColor: '#C49A45' });
                    e.target.value = '';
                }
            });
        });
    </script>
</body>
</html>
